<!DOCTYPE html>
<html>
<body>

<h1>VERSION 2026-06-22-2</h1>

<h3 id="question">
読み込み中...
</h3>

<button onclick="startRecognition()">
録音開始
</button>

<hr>

<p><b>認識結果</b></p>
<p id="result"></p>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbyiWrJyLuA9e9sBSsDtY5j1UXWjFc74rjsYQpM_hy89idvJXRqg6zQ4V2FGQKO025Rx/exec";

window.onload = function(){

  fetch(GAS_URL)
    .then(r => r.json())
    .then(data => {

      alert("QUESTION SET START");

      document.getElementById("question")
        .innerText = data.questions[0];

    })
    .catch(err => {

      alert("取得エラー: " + err);

    });

};

function startRecognition(){

  const recognition =
    new webkitSpeechRecognition();

  recognition.lang = "en-US";

  recognition.start();

  recognition.onresult = function(event){

    const spoken =
      event.results[0][0].transcript;

    document.getElementById("result")
      .innerText = spoken;

  };

}

</script>

</body>
</html>
