<!DOCTYPE html>
<html>
<body>

<h3 id="question">
The Internet has changed our lives in many ways.
</h3>

<button onclick="startRecognition()">
録音開始
</button>

<hr>

<p><b>認識結果</b></p>
<p id="result"></p>

<p><b>得点</b></p>
<p id="score"></p>

<p><b>不足語</b></p>
<p id="missing"></p>

<script>

function startRecognition(){

  const recognition =
    new webkitSpeechRecognition();

  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = function(event){

    const spoken =
      event.results[0][0].transcript;

    document.getElementById("result")
      .innerText = spoken;

    gradeReading(spoken);

  };

}

function gradeReading(spoken){

  const correct =
    document.getElementById("question")
      .innerText;

  const correctWords =
    normalize(correct);

  const spokenWords =
    normalize(spoken);

  const lcsLength =
    getLCSLength(correctWords, spokenWords);

  const score = Math.round(
    lcsLength /
    correctWords.length * 100
  );

  const missingWords =
    findMissingWords(correctWords, spokenWords);

  document.getElementById("score")
    .innerText = score + " 点";

  document.getElementById("missing")
    .innerText =
      missingWords.join(", ");
}

</script>

</body>
</html>
