<!DOCTYPE html>
<html>
<body>
  <h2>受験者情報</h2>

クラス<br>
<input id="studentClass"><br><br>

出席番号<br>
<input id="studentNumber"><br><br>

氏名<br>
<input id="studentName"><br><br>

<hr>

<h1>VERSION 2026-06-22-3</h1>

<h3 id="question">
読み込み中...
</h3>

<button onclick="startRecognition()">
録音開始
</button>

<hr>

<p><b>認識結果</b></p>
<p id="result"></p>

<p><b>得点</b></p>
<p id="score"></p>

<p><b>不足語</b></p>
<p id="missing"></p>  

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbww8h71AfxruoQI-yPQT_8pn1nWCD2OtFz0rHpqP27RMm-0eJRx4cYv3qYFHvYpycoX/exec";

window.onload = function(){

  alert("LOAD START");

  fetch(GAS_URL)
    .then(r => r.json())
    .then(data => {

      alert("JSON OK");

      document.getElementById("question")
        .innerText = data.questions[0];

    })
    .catch(err => {

      alert("取得エラー: " + err);

    });

};

function startRecognition(){

  const recognition =
    new webkitSpeechRecognition();

  recognition.lang = "en-US";

  recognition.start();

  recognition.onresult = function(event){

    const spoken =
      event.results[0][0].transcript;

    document.getElementById("result")
      .innerText = spoken;

    gradeReading(spoken);

  };

}

function gradeReading(spoken){
alert("GRADE START");
const correct =
document.getElementById("question")
.innerText;

const correctWords =
normalize(correct);

const spokenWords =
normalize(spoken);

const lcsInfo =
getLCSInfo(
correctWords,
spokenWords
);

const levenshteinInfo =
getLevenshteinInfo(
  correctWords,
  spokenWords
);

alert(
JSON.stringify(
levenshteinInfo
));

const score =
Math.round(
lcsInfo.lcsLength /
correctWords.length *100
);

const missingWords =
findMissingWords(
correctWords,
spokenWords
);

document.getElementById("score")
.innerText = score + " 点";

document.getElementById("missing")
.innerText =
missingWords.join(", ");

saveResult(
spoken,
score,
missingWords
);

}

function saveResult(
  recognitionText,
  score,
  missingWords
){

  alert("SAVE START");

  alert("POST先=" + GAS_URL);

  fetch(GAS_URL,{

    method:"POST",

    body:JSON.stringify({

      studentClass:
        document.getElementById(
          "studentClass"
        ).value,

      studentNumber:
        document.getElementById(
          "studentNumber"
        ).value,

      studentName:
        document.getElementById(
          "studentName"
        ).value,

      question:
        document.getElementById(
          "question"
        ).innerText,

      recognition:
        recognitionText,

      score:
        score,

      missing:
        missingWords.join(", ")

    })

  })
  .then(r=>r.text())
  .then(data=>{

    alert("返答=" + data);

  })
  .catch(err=>{

    alert("失敗=" + err);

  });

}
function normalize(text){

return text
.toLowerCase()
.replace(/[.,!?]/g,"")
.trim()
.split(/\s+/);

}

function getLCSInfo(correctWords, spokenWords){

  const m = correctWords.length;
  const n = spokenWords.length;

  const dp = [];

  for(let i=0;i<=m;i++){

    dp[i]=[];

    for(let j=0;j<=n;j++){

      dp[i][j]=0;

    }

  }

  for(let i=1;i<=m;i++){

    for(let j=1;j<=n;j++){

      if(correctWords[i-1]===spokenWords[j-1]){

        dp[i][j]=dp[i-1][j-1]+1;

      }else{

        dp[i][j]=Math.max(
          dp[i-1][j],
          dp[i][j-1]
        );

      }

    }

  }

  //----------------------------------
  // LCS復元
  //----------------------------------

  const matched=[];

  let i=m;
  let j=n;

  while(i>0 && j>0){

    if(correctWords[i-1]===spokenWords[j-1]){

      matched.unshift({

        correct:i-1,

        spoken:j-1,

        word:correctWords[i-1]

      });

      i--;
      j--;

    }

    else if(dp[i-1][j]>=dp[i][j-1]){

      i--;

    }

    else{

      j--;

    }

  }

  return{

    lcsLength:dp[m][n],

    matched:matched

  };

}
function getLevenshteinInfo(correctWords, spokenWords){

  const m = correctWords.length;
  const n = spokenWords.length;

  const dp = [];

  //---------------------------------
  // DP表作成
  //---------------------------------

  for(let i=0;i<=m;i++){

    dp[i]=[];

    for(let j=0;j<=n;j++){

      if(i===0){

        dp[i][j]=j;

      }

      else if(j===0){

        dp[i][j]=i;

      }

      else{

        dp[i][j]=0;

      }

    }

  }

  //---------------------------------
  // DP計算
  //---------------------------------

  for(let i=1;i<=m;i++){

    for(let j=1;j<=n;j++){

      const cost =
        (correctWords[i-1]===spokenWords[j-1])
        ?0
        :1;

      dp[i][j]=Math.min(

        dp[i-1][j]+1,      // DELETE

        dp[i][j-1]+1,      // INSERT

        dp[i-1][j-1]+cost  // MATCH / REPLACE

      );

    }

  }
  //---------------------------------
  // 編集履歴復元
  //---------------------------------

  const edits = [];

  let i = m;
  let j = n;


  return{

    distance:dp[m][n],

    edits:edits

  };

}
  
function findMissingWords(correctWords, spokenWords){

  const m = correctWords.length;
  const n = spokenWords.length;

  const dp = [];

  for(let i=0;i<=m;i++){

    dp[i]=[];

    for(let j=0;j<=n;j++){

      dp[i][j]=0;

    }

  }

  for(let i=1;i<=m;i++){

    for(let j=1;j<=n;j++){

      if(correctWords[i-1]===spokenWords[j-1]){

        dp[i][j]=dp[i-1][j-1]+1;

      }else{

        dp[i][j]=Math.max(
          dp[i-1][j],
          dp[i][j-1]
        );

      }

    }

  }

  const missing=[];

  let i=m;
  let j=n;

  while(i>0 && j>0){

    if(correctWords[i-1]===spokenWords[j-1]){

      i--;
      j--;

    }else if(dp[i-1][j]>=dp[i][j-1]){

      missing.unshift(correctWords[i-1]);
      i--;

    }else{

      j--;

    }

  }

  while(i>0){

    missing.unshift(correctWords[i-1]);
    i--;

  }

  return missing;

}

</script>

</body>
</html>
